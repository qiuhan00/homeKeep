server:
  port: 8080

spring:
  application:
    name: homekeep

  datasource:
    url: jdbc:mysql://localhost:3306/homekeep?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&useUnicode=true
    username: root
    password: 123456
    driver-class-name: com.mysql.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 3000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: homekeep-secret-key-2024-very-long-and-secure-key-for-jwt-signing
  expiration: 604800000  # 7 days in milliseconds

logging:
  level:
    com.homekeep: DEBUG
    org.springframework.security: DEBUG
